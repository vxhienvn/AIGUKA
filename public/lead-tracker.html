<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AIGUKA Lead Tracker</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:#f3f6fb;color:#0f172a;margin:0;padding:18px}.wrap{max-width:1240px;margin:auto}.top{display:flex;gap:8px;align-items:center;margin-bottom:12px}.btn{border:0;border-radius:10px;background:#e2e8f0;color:#0f172a;padding:10px 14px;font-weight:700;cursor:pointer}.btn.primary{background:#2563eb;color:white}.btn.green{background:#16a34a;color:white}.card{background:#fff;border:1px solid #dbe3ef;border-radius:14px;box-shadow:0 3px 10px #0000000d;padding:18px;margin-bottom:14px}h1{margin:0 0 8px;font-size:30px}.muted{color:#64748b;font-size:13px}.filters{display:flex;flex-wrap:wrap;gap:8px;align-items:end;margin-top:14px}.field label{display:block;font-size:12px;font-weight:700;margin-bottom:4px}.field input{padding:10px;border:1px solid #cbd5e1;border-radius:10px;background:white}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat b{display:block;font-size:26px;margin-top:4px}.table{width:100%;border-collapse:separate;border-spacing:0;background:white;border-radius:12px;overflow:hidden}.table th{background:#dbeafe;text-align:left;padding:10px;font-size:13px}.table td{border-bottom:1px solid #e5e7eb;padding:10px;vertical-align:top}.table tr:hover td{background:#f8fafc}.pill{display:inline-block;border-radius:999px;padding:3px 8px;background:#e0f2fe;margin:2px;font-size:12px}.danger{background:#fee2e2}.ok{background:#dcfce7}.drawer{display:none}.drawer.show{display:block}.msg{padding:8px 10px;border-radius:10px;margin:6px 0;max-width:900px}.customer{background:#e0f2fe}.bot{background:#f1f5f9}.admin{background:#dcfce7}.mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;white-space:pre-wrap}.empty{padding:16px;background:white;border-radius:12px}.loading{opacity:.65}@media(max-width:900px){.stats{grid-template-columns:1fr 1fr}.table{font-size:12px}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <button class="btn" onclick="location.href='/'">← Dashboard</button>
    <button class="btn green" onclick="quick(0)">Hôm nay</button>
    <button class="btn primary" onclick="quick(7)">7 ngày</button>
    <button class="btn primary" onclick="quick(30)">30 ngày</button>
    <button class="btn" onclick="location.href='/admin/v5-admin.html'">Admin</button>
    <button class="btn" onclick="location.href='/meta-evidence'">Meta Evidence</button>
  </div>
  <div class="card">
    <h1>📞 Lead Tracker theo quảng cáo</h1>
    <div class="muted">Mỗi quảng cáo ra bao nhiêu SĐT, gồm những số nào, kèm lịch sử hội thoại để đối chiếu Meta/Pancake.</div>
    <div class="filters">
      <div class="field"><label>Từ ngày</label><input type="date" id="from"></div>
      <div class="field"><label>Đến ngày</label><input type="date" id="to"></div>
      <button class="btn primary" onclick="loadSummary()">Lọc</button>
      <button class="btn" onclick="rebuild()">Quét lại từ messages</button>
      <span id="status" class="muted"></span>
    </div>
  </div>
  <div class="stats">
    <div class="card stat">Quảng cáo có lead<b id="sAds">0</b></div>
    <div class="card stat">SĐT unique<b id="sPhones">0</b></div>
    <div class="card stat">Cờ Zalo/Pancake<b id="sZalo">0</b></div>
    <div class="card stat">Tổng lead liên hệ<b id="sTotal">0</b></div>
  </div>
  <div class="card muted" id="rangeBox">Đang tải...</div>
  <table class="table">
    <thead><tr><th>#</th><th>Quảng cáo</th><th>SĐT thật</th><th>Cờ Zalo</th><th>Lead liên hệ</th><th>Hội thoại lead</th><th>Lead mới nhất</th><th>Chi tiết</th></tr></thead>
    <tbody id="rows"><tr><td colspan="8">Đang tải...</td></tr></tbody>
  </table>
  <div id="detail" class="card drawer"></div>
</div>
<script>
const $=id=>document.getElementById(id);
function yyyyMMdd(d){return d.toISOString().slice(0,10)}
function quick(days){const now=new Date(); $('to').value=yyyyMMdd(now); const f=new Date(now); f.setDate(f.getDate()-days); $('from').value=yyyyMMdd(f); loadSummary();}
function qs(){return `from=${$('from').value}&to=${$('to').value}`}
function vnTime(v){if(!v)return '-'; try{return new Date(v).toLocaleString('vi-VN',{timeZone:'Asia/Ho_Chi_Minh'})}catch(e){return v}}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
async function api(url){const r=await fetch(url); const j=await r.json(); if(!j.ok) throw new Error(j.error||j.reason||'API lỗi'); return j;}
async function loadSummary(){
  $('status').textContent='Đang tải...'; document.body.classList.add('loading');
  try{
    const j=await api(`/api/lead-tracker/summary?${qs()}`);
    $('sAds').textContent=j.totals.ads_with_leads||0; $('sPhones').textContent=j.totals.unique_phones||0; $('sZalo').textContent=j.totals.zalo_flags||0; $('sTotal').textContent=j.totals.total_contact_leads||0;
    $('rangeBox').textContent=`Khoảng dữ liệu: ${$('from').value} → ${$('to').value} theo giờ Việt Nam. ${j.rebuilt?'Đã tự quét lại messages.':''}`;
    const rows=j.rows||[];
    $('rows').innerHTML=rows.length?rows.map((r,i)=>`<tr><td>${i+1}</td><td><b>${esc(r.ad_name)}</b><br><span class="muted">${esc(r.ad_id)}</span><br><span class="muted">${esc(r.campaign_name||'')}</span></td><td><b>${r.phone_count}</b><br>${(r.phones||[]).slice(0,5).map(p=>`<span class="pill ok">${esc(p)}</span>`).join('')}</td><td>${r.zalo_count}</td><td>${r.total_contact_leads}</td><td>${r.conversation_count}</td><td>${vnTime(r.latest_time)}</td><td><button class="btn primary" onclick="detail('${encodeURIComponent(r.ad_id)}')">Xem</button></td></tr>`).join(''):`<tr><td colspan="8">Chưa có dữ liệu. Bấm “Quét lại từ messages”, hoặc chạy meta-browser-sync để lấy nguồn quảng cáo/evidence đầy đủ.</td></tr>`;
    $('status').textContent='Xong';
  }catch(e){$('rows').innerHTML=`<tr><td colspan="8">Lỗi: ${esc(e.message)}</td></tr>`; $('status').textContent='Lỗi';}
  finally{document.body.classList.remove('loading')}
}
async function rebuild(){ $('status').textContent='Đang quét lại messages...'; try{ await api(`/api/lead-tracker/rebuild?${qs()}&limit=3000`); await loadSummary(); }catch(e){alert(e.message)} }
async function detail(adId){
  const j=await api(`/api/lead-tracker/ad/${adId}/leads?${qs()}`); const rows=j.rows||[];
  $('detail').classList.add('show');
  $('detail').innerHTML=`<h2>Chi tiết quảng cáo ${esc(decodeURIComponent(adId))}</h2>`+(rows.length?rows.map((r,i)=>`<div class="card"><b>${i+1}. ${esc(r.phone||'(chưa có số, chỉ có cờ Zalo)')}</b> <span class="pill ${r.has_zalo?'ok':''}">${r.has_zalo?'Zalo/Pancake':'SĐT'}</span><br><span class="muted">${vnTime(r.message_time)} · Khách: ${esc(r.customer_name||r.sender_id||'')}</span><p><b>Tin nhắn bằng chứng:</b><br>${esc(r.evidence_message||'')}</p><button class="btn" onclick="conversation('${encodeURIComponent(r.conversation_id||'')}')">Xem hội thoại</button></div>`).join(''):'Không có lead trong khoảng này.');
  $('detail').scrollIntoView({behavior:'smooth'});
}
async function conversation(cid){ if(!cid){alert('Lead này chưa có conversation_id'); return;} const j=await api(`/api/lead-tracker/conversation/${cid}`); const ms=j.messages||[]; $('detail').innerHTML+=`<div class="card"><h3>Lịch sử hội thoại</h3>`+ms.map(m=>{const role=String(m.role||'');const cls=role.includes('customer')?'customer':(role.includes('admin')||role.includes('sale')?'admin':'bot');return `<div class="msg ${cls}"><b>${esc(role)}</b> <span class="muted">${vnTime(m.created_at)}</span><br>${esc(m.text||'')}</div>`}).join('')+`</div>`;}
quick(30);
</script>
</body>
</html>
