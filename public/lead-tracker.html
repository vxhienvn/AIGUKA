<!doctype html><html lang="vi"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AIGUKA Lead Tracker</title><style>
body{margin:0;background:#f3f6fb;color:#0f172a;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.wrap{max-width:1180px;margin:32px auto;padding:0 18px}.nav{display:flex;gap:10px;margin-bottom:14px}.btn{border:0;border-radius:10px;padding:10px 14px;font-weight:700;cursor:pointer;background:#e8eef7;color:#0f172a}.btn.primary{background:#2563eb;color:white}.btn.green{background:#16a34a;color:white}.card{background:white;border:1px solid #dbe3ef;border-radius:16px;box-shadow:0 4px 14px #0f172a10;padding:18px;margin-bottom:14px}h1{margin:0 0 8px;font-size:30px}.muted{color:#64748b;font-size:13px}.filters{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-top:14px}label{display:block;font-size:13px;font-weight:700;margin-bottom:4px}input{border:1px solid #cbd5e1;border-radius:10px;padding:10px 12px;background:white}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat b{display:block;font-size:26px;margin-top:6px}table{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden}th{background:#dbeafe;text-align:left;padding:12px;font-size:13px}td{border-bottom:1px solid #e5e7eb;padding:12px;font-size:14px;vertical-align:top}.link{color:#2563eb;font-weight:700;cursor:pointer}.drawer{display:none;position:fixed;inset:0;background:#0f172a66;z-index:20}.panel{background:white;max-width:780px;height:100%;margin-left:auto;padding:20px;overflow:auto}.lead{border:1px solid #e5e7eb;border-radius:12px;padding:12px;margin:10px 0;background:#f8fafc}.evidence{white-space:pre-wrap;background:#fff;border:1px dashed #cbd5e1;padding:10px;border-radius:10px;margin-top:8px}.err{color:#dc2626}.ok{color:#16a34a}@media(max-width:800px){.stats{grid-template-columns:1fr 1fr}.panel{max-width:none}}
</style></head><body><div class="wrap"><div class="nav"><button class="btn" onclick="location.href='/'">← Dashboard</button><button class="btn green" onclick="quick(0)">Hôm nay</button><button class="btn primary" onclick="quick(7)">7 ngày</button><button class="btn primary" onclick="quick(30)">30 ngày</button><button class="btn" onclick="location.href='/admin/ad-mapping.html'">Admin</button></div><div class="card"><h1>📞 Lead Tracker</h1><div class="muted">Module riêng dùng bảng <b>lt_*</b>. Quét số điện thoại/Zalo từ bảng messages, không dùng bảng ad_phone_leads cũ.</div><div class="filters"><div><label>Từ ngày</label><input type="date" id="from"></div><div><label>Đến ngày</label><input type="date" id="to"></div><button class="btn primary" onclick="load()">Lọc</button><button class="btn" onclick="scan()">Quét lại từ messages</button><span id="status" class="muted"></span></div></div><div class="stats"><div class="card stat">Quảng cáo có lead<b id="ads">0</b></div><div class="card stat">SĐT unique<b id="phones">0</b></div><div class="card stat">Cờ Zalo<b id="zalo">0</b></div><div class="card stat">Tổng lead liên hệ<b id="contacts">0</b></div></div><div class="card"><table><thead><tr><th>#</th><th>Quảng cáo</th><th>SĐT thật</th><th>Cờ Zalo</th><th>Lead liên hệ</th><th>Hội thoại</th><th>Lead mới nhất</th><th>Chi tiết</th></tr></thead><tbody id="body"><tr><td colspan="8">Đang tải...</td></tr></tbody></table></div></div><div class="drawer" id="drawer"><div class="panel"><button class="btn" onclick="closeDrawer()">Đóng</button><h2 id="dtitle">Chi tiết</h2><div id="leads"></div></div></div><script>
const $=id=>document.getElementById(id);let groups=[];function iso(d){return d.toISOString().slice(0,10)}function endOfDay(s){return s+'T23:59:59+07:00'}function startOfDay(s){return s+'T00:00:00+07:00'}function init(){const t=new Date();$('to').value=iso(t);const f=new Date(Date.now()-7*86400000);$('from').value=iso(f);load()}function quick(days){const t=new Date();$('to').value=iso(t);$('from').value=iso(new Date(days?Date.now()-days*86400000:Date.now()));load()}async function j(r){const t=await r.text();let d;try{d=JSON.parse(t)}catch{throw new Error(t)}if(!r.ok||d.success===false)throw new Error(d.error||t);return d}function setStatus(s,cls=''){ $('status').className=cls||'muted'; $('status').textContent=s}async function load(){try{setStatus('Đang tải...');const d=await j(await fetch(`/api/lead-tracker/summary?from=${encodeURIComponent(startOfDay($('from').value))}&to=${encodeURIComponent(endOfDay($('to').value))}`,{cache:'no-store'}));groups=d.groups||[];$('ads').textContent=d.totals?.ads||0;$('phones').textContent=d.totals?.phones||0;$('zalo').textContent=d.totals?.zalo||0;$('contacts').textContent=d.totals?.contacts||0;render();setStatus('Đã tải','ok')}catch(e){setStatus('Lỗi: '+e.message,'err');$('body').innerHTML=`<tr><td colspan="8" class="err">${esc(e.message)}</td></tr>`}}async function scan(){try{setStatus('Đang quét messages...');const d=await j(await fetch('/api/lead-tracker/scan-messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({from:startOfDay($('from').value),to:endOfDay($('to').value),limit:5000})}));setStatus(`Đã quét ${d.result.checked} tin, ghi ${d.result.leadRows} lead`,'ok');await load()}catch(e){setStatus('Lỗi quét: '+e.message,'err')}}function render(){if(!groups.length){$('body').innerHTML='<tr><td colspan="8">Chưa có dữ liệu. Bấm “Quét lại từ messages”. Nếu vẫn 0 thì messages trong khoảng ngày chưa có SĐT/Zalo.</td></tr>';return}$('body').innerHTML=groups.map((g,i)=>`<tr><td>${i+1}</td><td><b>${esc(g.ad_name||g.ad_id)}</b><br><span class="muted">${esc(g.ad_id)}</span></td><td>${g.phone_count}</td><td>${g.zalo_count}</td><td>${g.contact_count}</td><td>${g.conversation_count}</td><td>${g.latest_at?new Date(g.latest_at).toLocaleString('vi-VN'):''}</td><td><span class="link" onclick="detail('${escAttr(g.ad_id)}')">Xem</span></td></tr>`).join('')}async function detail(ad){const d=await j(await fetch('/api/lead-tracker/leads?ad_id='+encodeURIComponent(ad),{cache:'no-store'}));$('dtitle').textContent='Chi tiết: '+ad;$('leads').innerHTML=(d.rows||[]).map(x=>`<div class="lead"><b>${esc(x.phone||'(không có SĐT - cờ Zalo)')}</b> ${x.has_zalo?'• Zalo':''}<br><span class="muted">${esc(x.sender_id||'')} • ${x.message_time?new Date(x.message_time).toLocaleString('vi-VN'):''}</span><div class="evidence">${esc(x.evidence_text||'')}</div></div>`).join('')||'Không có lead';$('drawer').style.display='block'}function closeDrawer(){$('drawer').style.display='none'}function esc(s){return String(s??'').replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}function escAttr(s){return String(s??'').replace(/['"\\]/g,'')}init();</script></body></html>
